naftiko: "1.0.0-alpha1"

info:
  label: Amazon Glue
  description: Serverless data integration service for ETL, data catalog, and data pipeline orchestration across multiple data sources.
  tags:
    - Amazon Glue
    - ETL
    - Data Integration
    - Data Catalog
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: amazon-glue
      baseUri: https://glue.amazonaws.com
      description: Amazon Glue ETL and Data Catalog API
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_AUTH_HEADER}}"
        placement: header
      resources:
        - name: jobs
          path: /jobs
          description: ETL job management
          operations:
            - name: GetJobs
              method: POST
              description: List all Glue ETL jobs
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateJob
              method: POST
              description: Create a new ETL job
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: StartJobRun
              method: POST
              description: Start a job execution run
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: GetJobRun
              method: POST
              description: Get job run status
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: crawlers
          path: /crawlers
          description: Data Catalog crawler management
          operations:
            - name: GetCrawlers
              method: POST
              description: List all crawlers
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateCrawler
              method: POST
              description: Create a new crawler
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: StartCrawler
              method: POST
              description: Start a crawler run
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: databases
          path: /databases
          description: Data Catalog database management
          operations:
            - name: GetDatabases
              method: POST
              description: List all databases in Data Catalog
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateDatabase
              method: POST
              description: Create a Data Catalog database
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflows
          path: /workflows
          description: ETL workflow orchestration
          operations:
            - name: ListWorkflows
              method: POST
              description: List all ETL workflows
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateWorkflow
              method: POST
              description: Create a new workflow
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8083
      namespace: glue-rest-api
      resources:
        - path: /v1/jobs
          name: jobs
          operations:
            - method: GET
              name: list-jobs
              description: List all Glue ETL jobs
              call: amazon-glue.GetJobs
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9093
      namespace: glue-mcp
      transport: http
      tools:
        - name: list-jobs
          description: List all Amazon Glue ETL jobs
          hints:
            readOnly: true
          call: amazon-glue.GetJobs
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-job
          description: Create a new Glue ETL job
          hints:
            readOnly: false
          call: amazon-glue.CreateJob
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-job-run
          description: Start a Glue ETL job run
          hints:
            readOnly: false
          call: amazon-glue.StartJobRun
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job-run
          description: Get the status and details of a job run
          hints:
            readOnly: true
          call: amazon-glue.GetJobRun
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-crawlers
          description: List all Data Catalog crawlers
          hints:
            readOnly: true
          call: amazon-glue.GetCrawlers
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-crawler
          description: Create a new crawler to populate the Data Catalog
          hints:
            readOnly: false
          call: amazon-glue.CreateCrawler
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-crawler
          description: Start a crawler run to discover and catalog data
          hints:
            readOnly: false
          call: amazon-glue.StartCrawler
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-databases
          description: List all databases in the Glue Data Catalog
          hints:
            readOnly: true
          call: amazon-glue.GetDatabases
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-workflows
          description: List all Glue ETL workflows
          hints:
            readOnly: true
          call: amazon-glue.ListWorkflows
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-workflow
          description: Create a new Glue ETL workflow
          hints:
            readOnly: false
          call: amazon-glue.CreateWorkflow
          outputParameters:
            - type: object
              mapping: "$."
