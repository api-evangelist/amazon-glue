naftiko: "1.0.0-alpha1"

info:
  label: Amazon Glue Data Integration
  description: >-
    Workflow capability for data engineers building ETL pipelines with Amazon Glue.
    Covers job management, crawler configuration, data catalog operations, workflow
    orchestration, and data quality for serverless data integration.
  tags:
    - Amazon Glue
    - ETL
    - Data Integration
    - Data Catalog
    - Data Engineering
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: amazon-glue
      location: ./shared/amazon-glue.yaml

  exposes:
    - type: rest
      port: 8083
      namespace: glue-data-integration-api
      description: Unified REST API for Amazon Glue data integration operations.
      resources:
        - path: /v1/jobs
          name: jobs
          description: ETL job lifecycle management
          operations:
            - method: GET
              name: list-jobs
              description: List all ETL jobs
              call: amazon-glue.GetJobs
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-job
              description: Create a new ETL job
              call: amazon-glue.CreateJob
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/jobs/{jobName}/runs
          name: job-runs
          description: Job execution runs
          operations:
            - method: POST
              name: start-job-run
              description: Start a job run
              call: amazon-glue.StartJobRun
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/crawlers
          name: crawlers
          description: Data catalog crawlers
          operations:
            - method: GET
              name: list-crawlers
              description: List all crawlers
              call: amazon-glue.GetCrawlers
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-crawler
              description: Create a new crawler
              call: amazon-glue.CreateCrawler
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/databases
          name: databases
          description: Data Catalog databases
          operations:
            - method: GET
              name: list-databases
              description: List all catalog databases
              call: amazon-glue.GetDatabases
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workflows
          name: workflows
          description: ETL workflow orchestration
          operations:
            - method: GET
              name: list-workflows
              description: List all workflows
              call: amazon-glue.ListWorkflows
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-workflow
              description: Create a new ETL workflow
              call: amazon-glue.CreateWorkflow
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9093
      namespace: glue-data-integration-mcp
      transport: http
      description: MCP server for AI-assisted Amazon Glue data integration management.
      tools:
        - name: list-etl-jobs
          description: List all Amazon Glue ETL jobs with status and configuration
          hints:
            readOnly: true
            openWorld: true
          call: amazon-glue.GetJobs
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-etl-job
          description: Create a new Amazon Glue ETL job
          hints:
            readOnly: false
          call: amazon-glue.CreateJob
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-job-run
          description: Execute an ETL job run
          hints:
            readOnly: false
          call: amazon-glue.StartJobRun
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job-run-status
          description: Check the status of an ETL job run
          hints:
            readOnly: true
          call: amazon-glue.GetJobRun
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-crawlers
          description: List all Data Catalog crawlers
          hints:
            readOnly: true
          call: amazon-glue.GetCrawlers
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-crawler
          description: Create a crawler to discover and catalog data sources
          hints:
            readOnly: false
          call: amazon-glue.CreateCrawler
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-crawler
          description: Run a crawler to populate the Data Catalog
          hints:
            readOnly: false
          call: amazon-glue.StartCrawler
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-databases
          description: List all databases in the Glue Data Catalog
          hints:
            readOnly: true
          call: amazon-glue.GetDatabases
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tables
          description: List tables in a Data Catalog database
          hints:
            readOnly: true
          call: amazon-glue.GetTables
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-workflows
          description: List all ETL workflow orchestrations
          hints:
            readOnly: true
          call: amazon-glue.ListWorkflows
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-workflow
          description: Create a new ETL workflow with triggers and jobs
          hints:
            readOnly: false
          call: amazon-glue.CreateWorkflow
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connections
          description: List all data source connections
          hints:
            readOnly: true
          call: amazon-glue.GetConnections
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-connection
          description: Create a connection to a data source
          hints:
            readOnly: false
          call: amazon-glue.CreateConnection
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-ml-transforms
          description: List all Glue ML transforms
          hints:
            readOnly: true
          call: amazon-glue.GetMLTransforms
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-data-quality-results
          description: List data quality evaluation results
          hints:
            readOnly: true
          call: amazon-glue.ListDataQualityResults
          outputParameters:
            - type: object
              mapping: "$."
