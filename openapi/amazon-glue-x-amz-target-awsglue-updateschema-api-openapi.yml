              examples:
                UpdateSchema482Example:
                  summary: Default UpdateSchema 482 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
        '483':
          description: ConcurrentModificationException
          content:
            application/json:
              schema:
