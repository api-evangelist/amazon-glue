components:
  schemas:
    InternalServiceException: {}
    Boolean:
      type: boolean
    DataCatalogEncryptionSettings:
      type: object
      properties:
        EncryptionAtRest:
          allOf:
          - $ref: '#/components/schemas/EncryptionAtRest'
          - description: Specifies the encryption-at-rest configuration for the Data Catalog.
        ConnectionPasswordEncryption:
          allOf:
          - $ref: '#/components/schemas/ConnectionPasswordEncryption'
          - description: When connection password protection is enabled, the Data Catalog uses a customer-provided key to encrypt the password as part of <code>CreateConnection</code> or <code>UpdateConnection</code> and store it in the <code>ENCRYPTED_PASSWORD</code> field in the connection properties. You can enable catalog encryption or only password encryption.
      description: Contains configuration information for maintaining Data Catalog security.
    OperationTimeoutException: {}
    EncryptionAtRest:
      type: object
      required:
      - CatalogEncryptionMode
      properties:
        CatalogEncryptionMode:
          allOf:
          - $ref: '#/components/schemas/CatalogEncryptionMode'
          - description: The encryption-at-rest mode for encrypting Data Catalog data.
        SseAwsKmsKeyId:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The ID of the KMS key to use for encryption at rest.
      description: Specifies the encryption-at-rest configuration for the Data Catalog.
    PutDataCatalogEncryptionSettingsRequest:
      type: object
      required:
      - DataCatalogEncryptionSettings
      title: PutDataCatalogEncryptionSettingsRequest
      properties:
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog to set the security configuration for. If none is provided, the Amazon Web Services account ID is used by default.
        DataCatalogEncryptionSettings:
          allOf:
          - $ref: '#/components/schemas/DataCatalogEncryptionSettings'
          - description: The security configuration to set.
    PutDataCatalogEncryptionSettingsResponse:
      type: object
      properties: {}
    CatalogIdString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    CatalogEncryptionMode:
      type: string
      enum:
      - DISABLED
      - SSE-KMS
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    InvalidInputException: {}
    ConnectionPasswordEncryption:
      type: object
      required:
      - ReturnConnectionPasswordEncrypted
      properties:
        ReturnConnectionPasswordEncrypted:
          allOf:
          - $ref: '#/components/schemas/Boolean'
          - description: 'When the <code>ReturnConnectionPasswordEncrypted</code> flag is set to "true", passwords remain encrypted in the responses of <code>GetConnection</code> and <code>GetConnections</code>. This encryption takes effect independently from catalog encryption. '
        AwsKmsKeyId:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: <p>An KMS key that is used to encrypt the connection password. </p> <p>If connection password protection is enabled, the caller of <code>CreateConnection</code> and <code>UpdateConnection</code> needs at least <code>kms:Encrypt</code> permission on the specified KMS key, to encrypt passwords before storing them in the Data Catalog. </p> <p>You can set the decrypt permission to enable or restrict access on the password key according to your security requirements.</p>
      description: <p>The data structure used by the Data Catalog to encrypt the password as part of <code>CreateConnection</code> or <code>UpdateConnection</code> and store it in the <code>ENCRYPTED_PASSWORD</code> field in the connection properties. You can enable catalog encryption or only password encryption.</p> <p>When a <code>CreationConnection</code> request arrives containing a password, the Data Catalog first encrypts the password using your KMS key. It then encrypts the whole connection object again if catalog encryption is also enabled.</p> <p>This encryption requires that you set KMS key permissions to enable or restrict access on the password key according to your security requirements. For example, you might want only administrators to have decrypt permission on the password key.</p>
  parameters:
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
