components:
  schemas:
    BooleanColumnStatisticsData:
      type: object
      required:
      - NumberOfTrues
      - NumberOfFalses
      - NumberOfNulls
      properties:
        NumberOfTrues:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of true values in the column.
        NumberOfFalses:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of false values in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
      description: Defines column statistics supported for Boolean data columns.
    GetColumnNamesList:
      type: array
      items:
        $ref: '#/components/schemas/NameString'
      minItems: 0
      maxItems: 100
    Blob:
      type: string
    InternalServiceException: {}
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    LongColumnStatisticsData:
      type: object
      required:
      - NumberOfNulls
      - NumberOfDistinctValues
      properties:
        MinimumValue:
          allOf:
          - $ref: '#/components/schemas/Long'
          - description: The lowest value in the column.
        MaximumValue:
          allOf:
          - $ref: '#/components/schemas/Long'
          - description: The highest value in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
        NumberOfDistinctValues:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of distinct values in a column.
      description: Defines column statistics supported for integer data columns.
    GetColumnStatisticsForPartitionResponse:
      type: object
      properties:
        ColumnStatisticsList:
          allOf:
          - $ref: '#/components/schemas/ColumnStatisticsList'
          - description: List of ColumnStatistics that failed to be retrieved.
        Errors:
          allOf:
          - $ref: '#/components/schemas/ColumnErrors'
          - description: Error occurred during retrieving column statistics data.
    EntityNotFoundException: {}
    ErrorDetail:
      type: object
      properties:
        ErrorCode:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The code associated with this error.
        ErrorMessage:
          allOf:
          - $ref: '#/components/schemas/DescriptionString'
          - description: A message describing the error.
      description: Contains details about an error.
    ValueString:
      type: string
      maxLength: 1024
    DecimalColumnStatisticsData:
      type: object
      required:
      - NumberOfNulls
      - NumberOfDistinctValues
      properties:
        MinimumValue:
          allOf:
          - $ref: '#/components/schemas/DecimalNumber'
          - description: The lowest value in the column.
        MaximumValue:
          allOf:
          - $ref: '#/components/schemas/DecimalNumber'
          - description: The highest value in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
        NumberOfDistinctValues:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of distinct values in a column.
      description: Defines column statistics supported for fixed-point number data columns.
    ColumnErrors:
      type: array
      items:
        $ref: '#/components/schemas/ColumnError'
    OperationTimeoutException: {}
    Long:
      type: integer
    NonNegativeLong:
      type: integer
      minimum: 0
    DoubleColumnStatisticsData:
      type: object
      required:
      - NumberOfNulls
      - NumberOfDistinctValues
      properties:
        MinimumValue:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: The lowest value in the column.
        MaximumValue:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: The highest value in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
        NumberOfDistinctValues:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of distinct values in a column.
      description: Defines column statistics supported for floating-point number data columns.
    TypeString:
      type: string
      minLength: 0
      maxLength: 20000
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    GetColumnStatisticsForPartitionRequest:
      type: object
      required:
      - DatabaseName
      - TableName
      - PartitionValues
      - ColumnNames
      title: GetColumnStatisticsForPartitionRequest
      properties:
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog where the partitions in question reside. If none is supplied, the Amazon Web Services account ID is used by default.
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the catalog database where the partitions reside.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the partitions' table.
        PartitionValues:
          allOf:
          - $ref: '#/components/schemas/ValueStringList'
          - description: A list of partition values identifying the partition.
        ColumnNames:
          allOf:
          - $ref: '#/components/schemas/GetColumnNamesList'
          - description: A list of the column names.
    Double:
      type: number
      format: double
    NonNegativeDouble:
      type: number
      format: double
      minimum: 0
    ColumnStatisticsData:
      type: object
      required:
      - Type
      properties:
        Type:
          allOf:
          - $ref: '#/components/schemas/ColumnStatisticsType'
          - description: The type of column statistics data.
        BooleanColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/BooleanColumnStatisticsData'
          - description: Boolean column statistics data.
        DateColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/DateColumnStatisticsData'
          - description: Date column statistics data.
        DecimalColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/DecimalColumnStatisticsData'
          - description: ' Decimal column statistics data. UnscaledValues within are Base64-encoded binary objects storing big-endian, two''s complement representations of the decimal''s unscaled value. '
        DoubleColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/DoubleColumnStatisticsData'
          - description: Double column statistics data.
        LongColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/LongColumnStatisticsData'
          - description: Long column statistics data.
        StringColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/StringColumnStatisticsData'
          - description: String column statistics data.
        BinaryColumnStatisticsData:
          allOf:
          - $ref: '#/components/schemas/BinaryColumnStatisticsData'
          - description: Binary column statistics data.
      description: Contains the individual types of column statistics data. Only one data object should be set and indicated by the <code>Type</code> attribute.
    ColumnStatisticsType:
      type: string
      enum:
      - BOOLEAN
      - DATE
      - DECIMAL
      - DOUBLE
      - LONG
      - STRING
      - BINARY
    CatalogIdString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    ColumnError:
      type: object
      properties:
        ColumnName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the column that failed.
        Error:
          allOf:
          - $ref: '#/components/schemas/ErrorDetail'
          - description: An error message with the reason for the failure of an operation.
      description: Encapsulates a column name that failed and the reason for failure.
    ColumnStatisticsList:
      type: array
      items:
        $ref: '#/components/schemas/ColumnStatistics'
    StringColumnStatisticsData:
      type: object
      required:
      - MaximumLength
      - AverageLength
      - NumberOfNulls
      - NumberOfDistinctValues
      properties:
        MaximumLength:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The size of the longest string in the column.
        AverageLength:
          allOf:
          - $ref: '#/components/schemas/NonNegativeDouble'
          - description: The average string length in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
        NumberOfDistinctValues:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of distinct values in a column.
      description: Defines column statistics supported for character sequence data values.
    ValueStringList:
      type: array
      items:
        $ref: '#/components/schemas/ValueString'
    ColumnStatistics:
      type: object
      required:
      - ColumnName
      - ColumnType
      - AnalyzedTime
      - StatisticsData
      properties:
        ColumnName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: Name of column which statistics belong to.
        ColumnType:
          allOf:
          - $ref: '#/components/schemas/TypeString'
          - description: The data type of the column.
        AnalyzedTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The timestamp of when column statistics were generated.
        StatisticsData:
          allOf:
          - $ref: '#/components/schemas/ColumnStatisticsData'
          - description: A <code>ColumnStatisticData</code> object that contains the statistics data values.
      description: Represents the generated column-level statistics for a table or partition.
    GlueEncryptionException: {}
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    Integer:
      type: integer
    DateColumnStatisticsData:
      type: object
      required:
      - NumberOfNulls
      - NumberOfDistinctValues
      properties:
        MinimumValue:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The lowest value in the column.
        MaximumValue:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The highest value in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
        NumberOfDistinctValues:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of distinct values in a column.
      description: Defines column statistics supported for timestamp data columns.
    InvalidInputException: {}
    BinaryColumnStatisticsData:
      type: object
      required:
      - MaximumLength
      - AverageLength
      - NumberOfNulls
      properties:
        MaximumLength:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The size of the longest bit sequence in the column.
        AverageLength:
          allOf:
          - $ref: '#/components/schemas/NonNegativeDouble'
          - description: The average bit sequence length in the column.
        NumberOfNulls:
          allOf:
          - $ref: '#/components/schemas/NonNegativeLong'
          - description: The number of null values in the column.
      description: Defines column statistics supported for bit sequence data values.
    Timestamp:
      type: string
      format: date-time
    DecimalNumber:
      type: object
      required:
      - UnscaledValue
      - Scale
      properties:
        UnscaledValue:
          allOf:
          - $ref: '#/components/schemas/Blob'
          - description: The unscaled numeric value.
        Scale:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: The scale that determines where the decimal point falls in the unscaled value.
      description: Contains a numeric value in decimal format.
