components:
  schemas:
    InternalServiceException: {}
    NullableBoolean:
      type: boolean
    Blueprints:
      type: array
      items:
        $ref: '#/components/schemas/Blueprint'
    OperationTimeoutException: {}
    BatchGetBlueprintNames:
      type: array
      items:
        $ref: '#/components/schemas/OrchestrationNameString'
      minItems: 1
      maxItems: 25
    BatchGetBlueprintsRequest:
      type: object
      required:
      - Names
      title: BatchGetBlueprintsRequest
      properties:
        Names:
          allOf:
          - $ref: '#/components/schemas/BatchGetBlueprintNames'
          - description: A list of blueprint names.
        IncludeBlueprint:
          allOf:
          - $ref: '#/components/schemas/NullableBoolean'
          - description: Specifies whether or not to include the blueprint in the response.
        IncludeParameterSpec:
          allOf:
          - $ref: '#/components/schemas/NullableBoolean'
          - description: Specifies whether or not to include the parameters, as a JSON string, for the blueprint in the response.
    Generic512CharString:
      type: string
      minLength: 1
      maxLength: 512
    ErrorString:
      type: string
    BlueprintNames:
      type: array
      items:
        $ref: '#/components/schemas/OrchestrationNameString'
    BatchGetBlueprintsResponse:
      type: object
      properties:
        Blueprints:
          allOf:
          - $ref: '#/components/schemas/Blueprints'
          - description: Returns a list of blueprint as a <code>Blueprints</code> object.
        MissingBlueprints:
          allOf:
          - $ref: '#/components/schemas/BlueprintNames'
          - description: Returns a list of <code>BlueprintNames</code> that were not found.
    BlueprintParameterSpec:
      type: string
      minLength: 1
      maxLength: 131072
    OrchestrationNameString:
      type: string
      pattern: '[\.\-_A-Za-z0-9]+'
      minLength: 1
      maxLength: 128
    LastActiveDefinition:
      type: object
      properties:
        Description:
          allOf:
          - $ref: '#/components/schemas/Generic512CharString'
          - description: The description of the blueprint.
        LastModifiedOn:
          allOf:
          - $ref: '#/components/schemas/TimestampValue'
          - description: The date and time the blueprint was last modified.
        ParameterSpec:
          allOf:
          - $ref: '#/components/schemas/BlueprintParameterSpec'
          - description: A JSON string specifying the parameters for the blueprint.
        BlueprintLocation:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: Specifies a path in Amazon S3 where the blueprint is published by the Glue developer.
        BlueprintServiceLocation:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: Specifies a path in Amazon S3 where the blueprint is copied when you create or update the blueprint.
      description: When there are multiple versions of a blueprint and the latest version has some errors, this attribute indicates the last successful blueprint definition that is available with the service.
    GenericString:
      type: string
    BlueprintStatus:
      type: string
      enum:
      - CREATING
      - ACTIVE
      - UPDATING
      - FAILED
    TimestampValue:
      type: string
      format: date-time
    InvalidInputException: {}
    Blueprint:
      type: object
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/OrchestrationNameString'
          - description: The name of the blueprint.
        Description:
          allOf:
          - $ref: '#/components/schemas/Generic512CharString'
          - description: The description of the blueprint.
        CreatedOn:
          allOf:
          - $ref: '#/components/schemas/TimestampValue'
          - description: The date and time the blueprint was registered.
        LastModifiedOn:
          allOf:
          - $ref: '#/components/schemas/TimestampValue'
          - description: The date and time the blueprint was last modified.
        ParameterSpec:
          allOf:
          - $ref: '#/components/schemas/BlueprintParameterSpec'
          - description: A JSON string that indicates the list of parameter specifications for the blueprint.
        BlueprintLocation:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: Specifies the path in Amazon S3 where the blueprint is published.
        BlueprintServiceLocation:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: Specifies a path in Amazon S3 where the blueprint is copied when you call <code>CreateBlueprint/UpdateBlueprint</code> to register the blueprint in Glue.
        Status:
          allOf:
          - $ref: '#/components/schemas/BlueprintStatus'
          - description: <p>The status of the blueprint registration.</p> <ul> <li> <p>Creating — The blueprint registration is in progress.</p> </li> <li> <p>Active — The blueprint has been successfully registered.</p> </li> <li> <p>Updating — An update to the blueprint registration is in progress.</p> </li> <li> <p>Failed — The blueprint registration failed.</p> </li> </ul>
        ErrorMessage:
          allOf:
          - $ref: '#/components/schemas/ErrorString'
          - description: An error message.
        LastActiveDefinition:
          allOf:
          - $ref: '#/components/schemas/LastActiveDefinition'
          - description: When there are multiple versions of a blueprint and the latest version has some errors, this attribute indicates the last successful blueprint definition that is available with the service.
      description: The details of a blueprint.
