components:
  schemas:
    GetSchemaVersionsDiffInput:
      type: object
      required:
      - SchemaId
      - FirstSchemaVersionNumber
      - SecondSchemaVersionNumber
      - SchemaDiffType
      title: GetSchemaVersionsDiffInput
      properties:
        SchemaId:
          allOf:
          - $ref: '#/components/schemas/SchemaId'
          - description: '<p>This is a wrapper structure to contain schema identity fields. The structure contains:</p> <ul> <li> <p>SchemaId$SchemaArn: The Amazon Resource Name (ARN) of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.</p> </li> <li> <p>SchemaId$SchemaName: The name of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.</p> </li> </ul>'
        FirstSchemaVersionNumber:
          allOf:
          - $ref: '#/components/schemas/SchemaVersionNumber'
          - description: The first of the two schema versions to be compared.
        SecondSchemaVersionNumber:
          allOf:
          - $ref: '#/components/schemas/SchemaVersionNumber'
          - description: The second of the two schema versions to be compared.
        SchemaDiffType:
          allOf:
          - $ref: '#/components/schemas/SchemaDiffType'
          - description: Refers to <code>SYNTAX_DIFF</code>, which is the currently supported diff type.
    InternalServiceException: {}
    EntityNotFoundException: {}
    SchemaId:
      type: object
      properties:
        SchemaArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: The Amazon Resource Name (ARN) of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        SchemaName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema registry that contains the schema.
      description: The unique ID of the schema in the Glue schema registry.
    SchemaDiffType:
      type: string
      enum:
      - SYNTAX_DIFF
    GetSchemaVersionsDiffResponse:
      type: object
      properties:
        Diff:
          allOf:
          - $ref: '#/components/schemas/SchemaDefinitionDiff'
          - description: The difference between schemas as a string in JsonPatch format.
    LatestSchemaVersionBoolean:
      type: boolean
    AccessDeniedException: {}
    SchemaRegistryNameString:
      type: string
      pattern: '[a-zA-Z0-9-_$#.]+'
      minLength: 1
      maxLength: 255
    GlueResourceArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn):glue:.*
      minLength: 1
      maxLength: 10240
    InvalidInputException: {}
    SchemaVersionNumber:
      type: object
      properties:
        LatestVersion:
          allOf:
          - $ref: '#/components/schemas/LatestSchemaVersionBoolean'
          - description: The latest version available for the schema.
        VersionNumber:
          allOf:
          - $ref: '#/components/schemas/VersionLongNumber'
          - description: The version number of the schema.
      description: A structure containing the schema version information.
    VersionLongNumber:
      type: integer
      minimum: 1
      maximum: 100000
    SchemaDefinitionDiff:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 340000
  parameters:
    X-Amz-SignedHeaders:
