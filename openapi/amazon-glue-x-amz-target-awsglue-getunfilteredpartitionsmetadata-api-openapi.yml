          allOf:
          - $ref: '#/components/schemas/Partition'
          - description: The partition object.
        AuthorizedColumns:
          allOf:
          - $ref: '#/components/schemas/NameStringList'
          - description: The list of columns the user has permissions to access.
        IsRegisteredWithLakeFormation:
          allOf:
          - $ref: '#/components/schemas/Boolean'
          - description: A Boolean value indicating that the partition location is registered with Lake Formation.
      description: A partition that contains unfiltered metadata.
    PermissionTypeList:
      type: array
      items:
        $ref: '#/components/schemas/PermissionType'
      minItems: 1
      maxItems: 255
    EntityNotFoundException: {}
    SchemaId:
      type: object
      properties:
        SchemaArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: The Amazon Resource Name (ARN) of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        SchemaName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema registry that contains the schema.
      description: The unique ID of the schema in the Glue schema registry.
    PageSize:
      type: integer
      minimum: 1
      maximum: 1000
    ValueString:
      type: string
      maxLength: 1024
    NullableBoolean:
      type: boolean
    NameStringList:
      type: array
      items:
        $ref: '#/components/schemas/NameString'
    Segment:
      type: object
      required:
      - SegmentNumber
      - TotalSegments
      properties:
        SegmentNumber:
          allOf:
          - $ref: '#/components/schemas/NonNegativeInteger'
          - description: The zero-based index number of the segment. For example, if the total number of segments is 4, <code>SegmentNumber</code> values range from 0 through 3.
        TotalSegments:
          allOf:
          - $ref: '#/components/schemas/TotalSegmentsInteger'
          - description: The total number of segments.
      description: Defines a non-overlapping region of a table's partitions, allowing multiple requests to be run in parallel.
    AuditColumnNamesList:
      type: array
      items:
        $ref: '#/components/schemas/ColumnNameString'
    OperationTimeoutException: {}
    Column:
      type: object
      required:
      - Name
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the <code>Column</code>.
        Type:
          allOf:
          - $ref: '#/components/schemas/ColumnTypeString'
          - description: The data type of the <code>Column</code>.
        Comment:
          allOf:
          - $ref: '#/components/schemas/CommentString'
          - description: A free-form text comment.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define properties associated with the column.
      description: A column in a <code>Table</code>.
    UnfilteredPartitionList:
      type: array
      items:
        $ref: '#/components/schemas/UnfilteredPartition'
    ParametersMapValue:
      type: string
      maxLength: 512000
    CommentString:
      type: string
      minLength: 0
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    FederationSourceException: {}
    SkewedInfo:
      type: object
      properties:
        SkewedColumnNames:
          allOf:
          - $ref: '#/components/schemas/NameStringList'
          - description: A list of names of columns that contain skewed values.
        SkewedColumnValues:
          allOf:
          - $ref: '#/components/schemas/ColumnValueStringList'
          - description: A list of values that appear so frequently as to be considered skewed.
        SkewedColumnValueLocationMaps:
          allOf:
          - $ref: '#/components/schemas/LocationMap'
          - description: A mapping of skewed values to the columns that contain them.
      description: Specifies skewed values in a table. Skewed values are those that occur with very high frequency.
    GetUnfilteredPartitionsMetadataResponse:
      type: object
      properties:
        UnfilteredPartitions:
          allOf:
          - $ref: '#/components/schemas/UnfilteredPartitionList'
          - description: A list of requested partitions.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/Token'
          - description: A continuation token, if the returned list of partitions does not include the last one.
    Token:
      type: string
    PermissionTypeMismatchException: {}
    Partition:
      type: object
      properties:
        Values:
          allOf:
          - $ref: '#/components/schemas/ValueStringList'
          - description: The values of the partition.
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the catalog database in which to create the partition.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the database table in which to create the partition.
        CreationTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time at which the partition was created.
        LastAccessTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The last time at which the partition was accessed.
        StorageDescriptor:
          allOf:
          - $ref: '#/components/schemas/StorageDescriptor'
          - description: Provides information about the physical location where the partition is stored.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define partition parameters.
        LastAnalyzedTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The last time at which column statistics were computed for this partition.
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog in which the partition resides.
      description: Represents a slice of table data.
    PredicateString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    SchemaVersionIdString:
      type: string
      pattern: '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'
      minLength: 36
      maxLength: 36
    FederationSourceRetryableException: {}
    CatalogIdString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    OrderList:
      type: array
      items:
        $ref: '#/components/schemas/Order'
    AuditContextString:
      type: string
      minLength: 0
      maxLength: 2048
    SchemaRegistryNameString:
      type: string
      pattern: '[a-zA-Z0-9-_$#.]+'
      minLength: 1
      maxLength: 255
    SerDeInfo:
      type: object
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: Name of the SerDe.
        SerializationLibrary:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: Usually the class that implements the SerDe. An example is <code>org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe</code>.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define initialization parameters for the SerDe.
      description: Information about a serialization/deserialization program (SerDe) that serves as an extractor and loader.
    SchemaReference:
      type: object
      properties:
        SchemaId:
          allOf:
          - $ref: '#/components/schemas/SchemaId'
          - description: A structure that contains schema identity fields. Either this or the <code>SchemaVersionId</code> has to be provided.
        SchemaVersionId:
          allOf:
          - $ref: '#/components/schemas/SchemaVersionIdString'
          - description: The unique ID assigned to a version of the schema. Either this or the <code>SchemaId</code> has to be provided.
        SchemaVersionNumber:
          allOf:
          - $ref: '#/components/schemas/VersionLongNumber'
          - description: The version number of the schema.
      description: An object that references a schema stored in the Glue Schema Registry.
    ColumnValuesString:
      type: string
    ParametersMap:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ParametersMapValue'
    TotalSegmentsInteger:
      type: integer
      minimum: 1
      maximum: 10
    AuditContext:
      type: object
      properties:
        AdditionalAuditContext:
          allOf:
          - $ref: '#/components/schemas/AuditContextString'
          - description: A string containing the additional audit context information.
        RequestedColumns:
          allOf:
          - $ref: '#/components/schemas/AuditColumnNamesList'
          - description: The requested columns for audit.
        AllColumnsRequested:
          allOf:
          - $ref: '#/components/schemas/NullableBoolean'
          - description: All columns request for audit.
      description: A structure containing the Lake Formation audit context.
    GlueResourceArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn):glue:.*
      minLength: 1
      maxLength: 10240
    ValueStringList:
      type: array
      items:
        $ref: '#/components/schemas/ValueString'
    GetUnfilteredPartitionsMetadataRequest:
      type: object
      required:
      - CatalogId
      - DatabaseName
      - TableName
      - SupportedPermissionTypes
      title: GetUnfilteredPartitionsMetadataRequest
      properties:
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: 'The ID of the Data Catalog where the partitions in question reside. If none is provided, the AWS account ID is used by default. '
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the catalog database where the partitions reside.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the table that contains the partition.
        Expression:
          allOf:
          - $ref: '#/components/schemas/PredicateString'
          - description: '<p>An expression that filters the partitions to be returned.</p> <p>The expression uses SQL syntax similar to the SQL <code>WHERE</code> filter clause. The SQL statement parser <a href="http://jsqlparser.sourceforge.net/home.php">JSQLParser</a> parses the expression. </p> <p> <i>Operators</i>: The following are the operators that you can use in the <code>Expression</code> API call:</p> <dl> <dt>=</dt> <dd> <p>Checks whether the values of the two operands are equal; if yes, then the condition becomes true.</p> <p>Example: Assume ''variable a'' holds 10 and ''variable b'' holds 20. </p> <p>(a = b) is not true.</p> </dd> <dt>&lt; &gt;</dt> <dd> <p>Checks whether the values of two operands are equal; if the values are not equal, then the condition becomes true.</p> <p>Example: (a &lt; &gt; b) is true.</p> </dd> <dt>&gt;</dt> <dd> <p>Checks whether the value of the left operand is greater than the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &gt; b) is not true.</p> </dd> <dt>&lt;</dt> <dd> <p>Checks whether the value of the left operand is less than the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &lt; b) is true.</p> </dd> <dt>&gt;=</dt> <dd> <p>Checks whether the value of the left operand is greater than or equal to the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &gt;= b) is not true.</p> </dd> <dt>&lt;=</dt> <dd> <p>Checks whether the value of the left operand is less than or equal to the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &lt;= b) is true.</p> </dd> <dt>AND, OR, IN, BETWEEN, LIKE, NOT, IS NULL</dt> <dd> <p>Logical operators.</p> </dd> </dl> <p> <i>Supported Partition Key Types</i>: The following are the supported partition keys.</p> <ul> <li> <p> <code>string</code> </p> </li> <li> <p> <code>date</code> </p> </li> <li> <p> <code>timestamp</code> </p> </li> <li> <p> <code>int</code> </p> </li> <li> <p> <code>bigint</code> </p> </li> <li> <p> <code>long</code> </p> </li> <li> <p> <code>tinyint</code> </p> </li> <li> <p> <code>smallint</code> </p> </li> <li> <p> <code>decimal</code> </p> </li> </ul> <p>If an type is encountered that is not valid, an exception is thrown. </p>'
