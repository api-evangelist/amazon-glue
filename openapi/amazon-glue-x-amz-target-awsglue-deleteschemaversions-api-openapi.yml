components:
  schemas:
    DeleteSchemaVersionsInput:
      type: object
      required:
      - SchemaId
      - Versions
      title: DeleteSchemaVersionsInput
      properties:
        SchemaId:
          allOf:
          - $ref: '#/components/schemas/SchemaId'
          - description: This is a wrapper structure that may contain the schema name and Amazon Resource Name (ARN).
        Versions:
          allOf:
          - $ref: '#/components/schemas/VersionsString'
          - description: '<p>A version range may be supplied which may be of the format:</p> <ul> <li> <p>a single version number, 5</p> </li> <li> <p>a range, 5-8 : deletes versions 5, 6, 7, 8</p> </li> </ul>'
    ErrorMessageString:
      type: string
    SchemaId:
      type: object
      properties:
        SchemaArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: The Amazon Resource Name (ARN) of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        SchemaName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema registry that contains the schema.
      description: The unique ID of the schema in the Glue schema registry.
    EntityNotFoundException: {}
    ErrorCodeString:
      type: string
    DeleteSchemaVersionsResponse:
      type: object
      properties:
        SchemaVersionErrors:
          allOf:
          - $ref: '#/components/schemas/SchemaVersionErrorList'
          - description: A list of <code>SchemaVersionErrorItem</code> objects, each containing an error and schema version.
    SchemaVersionErrorItem:
      type: object
      properties:
        VersionNumber:
          allOf:
          - $ref: '#/components/schemas/VersionLongNumber'
          - description: The version number of the schema.
        ErrorDetails:
          allOf:
          - $ref: '#/components/schemas/ErrorDetails'
          - description: The details of the error for the schema version.
      description: An object that contains the error details for an operation on a schema version.
    ConcurrentModificationException: {}
    AccessDeniedException: {}
    SchemaRegistryNameString:
      type: string
      pattern: '[a-zA-Z0-9-_$#.]+'
      minLength: 1
      maxLength: 255
    SchemaVersionErrorList:
      type: array
      items:
        $ref: '#/components/schemas/SchemaVersionErrorItem'
    ErrorDetails:
      type: object
      properties:
        ErrorCode:
          allOf:
          - $ref: '#/components/schemas/ErrorCodeString'
          - description: The error code for an error.
        ErrorMessage:
          allOf:
          - $ref: '#/components/schemas/ErrorMessageString'
          - description: The error message for an error.
      description: An object containing error details.
    GlueResourceArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn):glue:.*
      minLength: 1
      maxLength: 10240
    InvalidInputException: {}
    VersionsString:
      type: string
      pattern: '[1-9][0-9]*|[1-9][0-9]*-[1-9][0-9]*'
      minLength: 1
      maxLength: 100000
    VersionLongNumber:
      type: integer
      minimum: 1
      maximum: 100000
