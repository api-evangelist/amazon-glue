components:
  schemas:
    CreatedTimestamp:
      type: string
    InternalServiceException: {}
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    EntityNotFoundException: {}
    MaxResultsNumber:
      type: integer
      minimum: 1
      maximum: 100
    SchemaListDefinition:
      type: array
      items:
        $ref: '#/components/schemas/SchemaListItem'
    UpdatedTimestamp:
      type: string
    ListSchemasInput:
      type: object
      title: ListSchemasInput
      properties:
        RegistryId:
          allOf:
          - $ref: '#/components/schemas/RegistryId'
          - description: A wrapper structure that may contain the registry name and Amazon Resource Name (ARN).
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/MaxResultsNumber'
          - description: Maximum number of results required per page. If the value is not supplied, this will be defaulted to 25 per page.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryTokenString'
          - description: A continuation token, if this is a continuation call.
    SchemaRegistryNameString:
      type: string
      pattern: '[a-zA-Z0-9-_$#.]+'
      minLength: 1
      maxLength: 255
    AccessDeniedException: {}
    SchemaRegistryTokenString:
      type: string
    GlueResourceArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn):glue:.*
      minLength: 1
      maxLength: 10240
    ListSchemasResponse:
      type: object
      properties:
        Schemas:
          allOf:
          - $ref: '#/components/schemas/SchemaListDefinition'
          - description: An array of <code>SchemaListItem</code> objects containing details of each schema.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryTokenString'
          - description: A continuation token for paginating the returned list of tokens, returned if the current segment of the list is not the last.
    SchemaListItem:
      type: object
      properties:
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: the name of the registry where the schema resides.
        SchemaName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema.
        SchemaArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: The Amazon Resource Name (ARN) for the schema.
        Description:
          allOf:
          - $ref: '#/components/schemas/DescriptionString'
          - description: A description for the schema.
        SchemaStatus:
          allOf:
          - $ref: '#/components/schemas/SchemaStatus'
          - description: The status of the schema.
        CreatedTime:
          allOf:
          - $ref: '#/components/schemas/CreatedTimestamp'
          - description: The date and time that a schema was created.
        UpdatedTime:
          allOf:
          - $ref: '#/components/schemas/UpdatedTimestamp'
          - description: The date and time that a schema was updated.
      description: An object that contains minimal details for a schema.
    InvalidInputException: {}
    SchemaStatus:
      type: string
      enum:
      - AVAILABLE
      - PENDING
      - DELETING
    RegistryId:
      type: object
      properties:
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: 'Name of the registry. Used only for lookup. One of <code>RegistryArn</code> or <code>RegistryName</code> has to be provided. '
        RegistryArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: Arn of the registry to be updated. One of <code>RegistryArn</code> or <code>RegistryName</code> has to be provided.
      description: A wrapper structure that may contain the registry name and Amazon Resource Name (ARN).
  parameters:
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
