      description: Specifies how Amazon Simple Storage Service (Amazon S3) data should be encrypted.
    CloudWatchEncryptionMode:
      type: string
      enum:
      - DISABLED
      - SSE-KMS
    GetSecurityConfigurationRequest:
      type: object
      required:
