components:
  schemas:
    DataSource:
      type: object
      required:
      - GlueTable
      properties:
        GlueTable:
          allOf:
          - $ref: '#/components/schemas/GlueTable'
          - description: An Glue table.
      description: A data source (an Glue table) for which you want data quality results.
    InternalServiceException: {}
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    ExecutionTime:
      type: integer
    RoleString:
      type: string
    NullableInteger:
      type: integer
    EntityNotFoundException: {}
    GetDataQualityRuleRecommendationRunRequest:
      type: object
      required:
      - RunId
      title: GetDataQualityRuleRecommendationRunRequest
      properties:
        RunId:
          allOf:
          - $ref: '#/components/schemas/HashString'
          - description: The unique run identifier associated with this run.
    OperationTimeoutException: {}
    DataQualityRulesetString:
      type: string
      minLength: 1
      maxLength: 65536
    Timeout:
      type: integer
      minimum: 1
    HashString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    GlueTable:
      type: object
      required:
      - DatabaseName
      - TableName
      properties:
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: A database name in the Glue Data Catalog.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: A table name in the Glue Data Catalog.
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: A unique identifier for the Glue Data Catalog.
        ConnectionName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the connection to the Glue Data Catalog.
        AdditionalOptions:
          allOf:
          - $ref: '#/components/schemas/GlueTableAdditionalOptions'
          - description: '<p>Additional options for the table. Currently there are two keys supported:</p> <ul> <li> <p> <code>pushDownPredicate</code>: to filter on partitions without having to list and read all the files in your dataset.</p> </li> <li> <p> <code>catalogPartitionPredicate</code>: to use server-side partition pruning using partition indexes in the Glue Data Catalog.</p> </li> </ul>'
      description: The database and table in the Glue Data Catalog that is used for input or output data.
    GenericString:
      type: string
    TaskStatusType:
      type: string
      enum:
      - STARTING
      - RUNNING
      - STOPPING
      - STOPPED
      - SUCCEEDED
      - FAILED
      - TIMEOUT
    GlueTableAdditionalOptions:
      type: object
      minProperties: 1
      maxProperties: 10
      additionalProperties:
        $ref: '#/components/schemas/DescriptionString'
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    Timestamp:
      type: string
      format: date-time
    InvalidInputException: {}
    GetDataQualityRuleRecommendationRunResponse:
      type: object
      properties:
        RunId:
          allOf:
          - $ref: '#/components/schemas/HashString'
          - description: The unique run identifier associated with this run.
        DataSource:
          allOf:
          - $ref: '#/components/schemas/DataSource'
          - description: The data source (an Glue table) associated with this run.
        Role:
          allOf:
          - $ref: '#/components/schemas/RoleString'
          - description: An IAM role supplied to encrypt the results of the run.
        NumberOfWorkers:
          allOf:
          - $ref: '#/components/schemas/NullableInteger'
          - description: The number of <code>G.1X</code> workers to be used in the run. The default is 5.
        Timeout:
          allOf:
          - $ref: '#/components/schemas/Timeout'
          - description: The timeout for a run in minutes. This is the maximum time that a run can consume resources before it is terminated and enters <code>TIMEOUT</code> status. The default is 2,880 minutes (48 hours).
        Status:
          allOf:
          - $ref: '#/components/schemas/TaskStatusType'
          - description: The status for this run.
        ErrorString:
          allOf:
          - $ref: '#/components/schemas/GenericString'
          - description: The error strings that are associated with the run.
        StartedOn:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date and time when this run started.
        LastModifiedOn:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: A timestamp. The last point in time when this data quality rule recommendation run was modified.
        CompletedOn:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date and time when this run was completed.
        ExecutionTime:
          allOf:
          - $ref: '#/components/schemas/ExecutionTime'
          - description: The amount of time (in seconds) that the run consumed resources.
        RecommendedRuleset:
          allOf:
          - $ref: '#/components/schemas/DataQualityRulesetString'
          - description: When a start rule recommendation run completes, it creates a recommended ruleset (a set of rules). This member has those rules in Data Quality Definition Language (DQDL) format.
        CreatedRulesetName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the ruleset that was created by the run.
