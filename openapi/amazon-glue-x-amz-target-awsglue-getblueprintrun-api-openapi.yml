paths:
  /#X-Amz-Target=AWSGlue.GetBlueprintRun:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetBlueprintRun
      description: Retrieves the details of a blueprint run.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBlueprintRunResponse'
              examples:
                GetBlueprintRun200Example:
                  summary: Default GetBlueprintRun 200 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
        '480':
          description: EntityNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityNotFoundException'
              examples:
                GetBlueprintRun480Example:
                  summary: Default GetBlueprintRun 480 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
        '481':
          description: InternalServiceException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServiceException'
              examples:
                GetBlueprintRun481Example:
                  summary: Default GetBlueprintRun 481 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
        '482':
          description: OperationTimeoutException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationTimeoutException'
              examples:
                GetBlueprintRun482Example:
                  summary: Default GetBlueprintRun 482 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetBlueprintRunRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AWSGlue.GetBlueprintRun
      summary: Amazon Glue Get Blueprint Run
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=AWSGlue.GetBlueprintRun'
components:
  schemas:
    InternalServiceException: {}
    MessageString:
      type: string
    GetBlueprintRunResponse:
      type: object
      properties:
        BlueprintRun:
          allOf:
          - $ref: '#/components/schemas/BlueprintRun'
          - description: Returns a <code>BlueprintRun</code> object.
    OrchestrationIAMRoleArn:
      type: string
      pattern: arn:aws[^:]*:iam::[0-9]*:role/.+
      minLength: 1
      maxLength: 1024
    EntityNotFoundException: {}
    BlueprintParameters:
      type: string
      minLength: 1
      maxLength: 131072
    OperationTimeoutException: {}
    BlueprintRunState:
      type: string
      enum:
      - RUNNING
      - SUCCEEDED
      - FAILED
      - ROLLING_BACK
    BlueprintRun:
      type: object
      properties:
        BlueprintName:
          allOf:
          - $ref: '#/components/schemas/OrchestrationNameString'
          - description: The name of the blueprint.
        RunId:
          allOf:
          - $ref: '#/components/schemas/IdString'
          - description: The run ID for this blueprint run.
        WorkflowName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of a workflow that is created as a result of a successful blueprint run. If a blueprint run has an error, there will not be a workflow created.
        State:
          allOf:
          - $ref: '#/components/schemas/BlueprintRunState'
          - description: <p>The state of the blueprint run. Possible values are:</p> <ul> <li> <p>Running — The blueprint run is in progress.</p> </li> <li> <p>Succeeded — The blueprint run completed successfully.</p> </li> <li> <p>Failed — The blueprint run failed and rollback is complete.</p> </li> <li> <p>Rolling Back — The blueprint run failed and rollback is in progress.</p> </li> </ul>
        StartedOn:
          allOf:
          - $ref: '#/components/schemas/TimestampValue'
          - description: The date and time that the blueprint run started.
        CompletedOn:
          allOf:
          - $ref: '#/components/schemas/TimestampValue'
          - description: The date and time that the blueprint run completed.
        ErrorMessage:
          allOf:
          - $ref: '#/components/schemas/MessageString'
          - description: Indicates any errors that are seen while running the blueprint.
        RollbackErrorMessage:
          allOf:
          - $ref: '#/components/schemas/MessageString'
          - description: If there are any errors while creating the entities of a workflow, we try to roll back the created entities until that point and delete them. This attribute indicates the errors seen while trying to delete the entities that are created.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/BlueprintParameters'
          - description: The blueprint parameters as a string. You will have to provide a value for each key that is required from the parameter spec that is defined in the <code>Blueprint$ParameterSpec</code>.
        RoleArn:
          allOf:
          - $ref: '#/components/schemas/OrchestrationIAMRoleArn'
          - description: The role ARN. This role will be assumed by the Glue service and will be used to create the workflow and other entities of a workflow.
      description: The details of a blueprint run.
    IdString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    OrchestrationNameString:
      type: string
      pattern: '[\.\-_A-Za-z0-9]+'
      minLength: 1
      maxLength: 128
    TimestampValue:
      type: string
      format: date-time
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    GetBlueprintRunRequest:
      type: object
      required:
      - BlueprintName
      - RunId
      title: GetBlueprintRunRequest
      properties:
        BlueprintName:
          allOf:
          - $ref: '#/components/schemas/OrchestrationNameString'
          - description: The name of the blueprint.
        RunId:
          allOf:
          - $ref: '#/components/schemas/IdString'
          - description: The run ID for the blueprint run you want to retrieve.
  parameters:
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
