          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartMLEvaluationTaskRunResponse'
              examples:
                StartMLEvaluationTaskRun200Example:
                  summary: Default StartMLEvaluationTaskRun 200 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
