components:
  schemas:
    DataQualityRulesetEvaluationRunFilter:
      type: object
      required:
      - DataSource
      properties:
        DataSource:
          allOf:
          - $ref: '#/components/schemas/DataSource'
          - description: Filter based on a data source (an Glue table) associated with the run.
        StartedBefore:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: Filter results by runs that started before this time.
        StartedAfter:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: Filter results by runs that started after this time.
      description: The filter criteria.
    DataSource:
      type: object
      required:
      - GlueTable
      properties:
        GlueTable:
          allOf:
          - $ref: '#/components/schemas/GlueTable'
          - description: An Glue table.
      description: A data source (an Glue table) for which you want data quality results.
    DataQualityRulesetEvaluationRunDescription:
      type: object
      properties:
        RunId:
          allOf:
          - $ref: '#/components/schemas/HashString'
          - description: The unique run identifier associated with this run.
        Status:
          allOf:
          - $ref: '#/components/schemas/TaskStatusType'
          - description: The status for this run.
        StartedOn:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date and time when the run started.
        DataSource:
          allOf:
          - $ref: '#/components/schemas/DataSource'
          - description: The data source (an Glue table) associated with the run.
      description: Describes the result of a data quality ruleset evaluation run.
    InternalServiceException: {}
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    ListDataQualityRulesetEvaluationRunsResponse:
      type: object
      properties:
        Runs:
          allOf:
          - $ref: '#/components/schemas/DataQualityRulesetEvaluationRunList'
          - description: A list of <code>DataQualityRulesetEvaluationRunDescription</code> objects representing data quality ruleset runs.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/PaginationToken'
          - description: A pagination token, if more results are available.
    PageSize:
      type: integer
      minimum: 1
      maximum: 1000
    PaginationToken:
      type: string
    ListDataQualityRulesetEvaluationRunsRequest:
      type: object
      title: ListDataQualityRulesetEvaluationRunsRequest
      properties:
        Filter:
          allOf:
          - $ref: '#/components/schemas/DataQualityRulesetEvaluationRunFilter'
          - description: The filter criteria.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/PaginationToken'
          - description: A paginated token to offset the results.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/PageSize'
          - description: The maximum number of results to return.
    OperationTimeoutException: {}
    HashString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    GlueTable:
      type: object
      required:
      - DatabaseName
      - TableName
      properties:
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: A database name in the Glue Data Catalog.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: A table name in the Glue Data Catalog.
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: A unique identifier for the Glue Data Catalog.
        ConnectionName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the connection to the Glue Data Catalog.
        AdditionalOptions:
          allOf:
          - $ref: '#/components/schemas/GlueTableAdditionalOptions'
          - description: '<p>Additional options for the table. Currently there are two keys supported:</p> <ul> <li> <p> <code>pushDownPredicate</code>: to filter on partitions without having to list and read all the files in your dataset.</p> </li> <li> <p> <code>catalogPartitionPredicate</code>: to use server-side partition pruning using partition indexes in the Glue Data Catalog.</p> </li> </ul>'
      description: The database and table in the Glue Data Catalog that is used for input or output data.
    TaskStatusType:
      type: string
      enum:
      - STARTING
      - RUNNING
      - STOPPING
      - STOPPED
      - SUCCEEDED
      - FAILED
      - TIMEOUT
    GlueTableAdditionalOptions:
      type: object
      minProperties: 1
      maxProperties: 10
      additionalProperties:
        $ref: '#/components/schemas/DescriptionString'
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    Timestamp:
      type: string
      format: date-time
    InvalidInputException: {}
    DataQualityRulesetEvaluationRunList:
      type: array
      items:
        $ref: '#/components/schemas/DataQualityRulesetEvaluationRunDescription'
