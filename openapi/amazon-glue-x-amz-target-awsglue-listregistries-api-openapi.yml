components:
  schemas:
    CreatedTimestamp:
      type: string
    InternalServiceException: {}
    ListRegistriesResponse:
      type: object
      properties:
        Registries:
          allOf:
          - $ref: '#/components/schemas/RegistryListDefinition'
          - description: An array of <code>RegistryDetailedListItem</code> objects containing minimal details of each registry.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryTokenString'
          - description: A continuation token for paginating the returned list of tokens, returned if the current segment of the list is not the last.
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    RegistryStatus:
      type: string
      enum:
      - AVAILABLE
      - DELETING
    MaxResultsNumber:
      type: integer
      minimum: 1
      maximum: 100
    UpdatedTimestamp:
      type: string
    ListRegistriesInput:
      type: object
      title: ListRegistriesInput
      properties:
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/MaxResultsNumber'
          - description: Maximum number of results required per page. If the value is not supplied, this will be defaulted to 25 per page.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryTokenString'
          - description: A continuation token, if this is a continuation call.
    RegistryListItem:
      type: object
      properties:
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the registry.
        RegistryArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: The Amazon Resource Name (ARN) of the registry.
        Description:
          allOf:
          - $ref: '#/components/schemas/DescriptionString'
          - description: A description of the registry.
        Status:
          allOf:
          - $ref: '#/components/schemas/RegistryStatus'
          - description: The status of the registry.
        CreatedTime:
          allOf:
          - $ref: '#/components/schemas/CreatedTimestamp'
          - description: The data the registry was created.
        UpdatedTime:
          allOf:
          - $ref: '#/components/schemas/UpdatedTimestamp'
          - description: The date the registry was updated.
      description: A structure containing the details for a registry.
    RegistryListDefinition:
      type: array
      items:
        $ref: '#/components/schemas/RegistryListItem'
    AccessDeniedException: {}
    SchemaRegistryNameString:
      type: string
      pattern: '[a-zA-Z0-9-_$#.]+'
      minLength: 1
      maxLength: 255
    SchemaRegistryTokenString:
      type: string
    GlueResourceArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn):glue:.*
      minLength: 1
      maxLength: 10240
    InvalidInputException: {}
