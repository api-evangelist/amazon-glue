components:
  schemas:
    IntegerFlag:
      type: integer
      minimum: 0
      maximum: 1
    StorageDescriptor:
      type: object
      properties:
        Columns:
          allOf:
          - $ref: '#/components/schemas/ColumnList'
          - description: A list of the <code>Columns</code> in the table.
        Location:
          allOf:
          - $ref: '#/components/schemas/LocationString'
          - description: The physical location of the table. By default, this takes the form of the warehouse location, followed by the database location in the warehouse, followed by the table name.
        AdditionalLocations:
          allOf:
          - $ref: '#/components/schemas/LocationStringList'
          - description: A list of locations that point to the path where a Delta table is located.
        InputFormat:
          allOf:
          - $ref: '#/components/schemas/FormatString'
          - description: 'The input format: <code>SequenceFileInputFormat</code> (binary), or <code>TextInputFormat</code>, or a custom format.'
        OutputFormat:
          allOf:
          - $ref: '#/components/schemas/FormatString'
          - description: 'The output format: <code>SequenceFileOutputFormat</code> (binary), or <code>IgnoreKeyTextOutputFormat</code>, or a custom format.'
        Compressed:
          allOf:
          - $ref: '#/components/schemas/Boolean'
          - description: ' <code>True</code> if the data in the table is compressed, or <code>False</code> if not.'
        NumberOfBuckets:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: Must be specified if the table contains any dimension columns.
        SerdeInfo:
          allOf:
          - $ref: '#/components/schemas/SerDeInfo'
          - description: The serialization/deserialization (SerDe) information.
        BucketColumns:
          allOf:
          - $ref: '#/components/schemas/NameStringList'
          - description: A list of reducer grouping columns, clustering columns, and bucketing columns in the table.
        SortColumns:
          allOf:
          - $ref: '#/components/schemas/OrderList'
          - description: A list specifying the sort order of each bucket in the table.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: The user-supplied properties in key-value form.
        SkewedInfo:
          allOf:
          - $ref: '#/components/schemas/SkewedInfo'
          - description: The information about values that appear frequently in a column (skewed values).
        StoredAsSubDirectories:
          allOf:
          - $ref: '#/components/schemas/Boolean'
          - description: ' <code>True</code> if the table data is stored in subdirectories, or <code>False</code> if not.'
        SchemaReference:
          allOf:
          - $ref: '#/components/schemas/SchemaReference'
          - description: <p>An object that references a schema stored in the Glue Schema Registry.</p> <p>When creating a table, you can pass an empty list of columns for the schema, and instead use a schema reference.</p>
      description: Describes the physical storage of table data.
    LocationStringList:
      type: array
      items:
        $ref: '#/components/schemas/LocationString'
    ColumnList:
      type: array
      items:
        $ref: '#/components/schemas/Column'
    InternalServiceException: {}
    BooleanNullable:
      type: boolean
    LocationString:
      type: string
      maxLength: 2056
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    Boolean:
      type: boolean
    FormatString:
      type: string
      maxLength: 128
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    ColumnTypeString:
      type: string
      minLength: 0
      maxLength: 131072
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    ColumnValueStringList:
      type: array
      items:
        $ref: '#/components/schemas/ColumnValuesString'
    GetPartitionsResponse:
      type: object
      properties:
        Partitions:
          allOf:
          - $ref: '#/components/schemas/PartitionList'
          - description: A list of requested partitions.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/Token'
          - description: A continuation token, if the returned list of partitions does not include the last one.
    EntityNotFoundException: {}
    SchemaId:
      type: object
      properties:
        SchemaArn:
          allOf:
          - $ref: '#/components/schemas/GlueResourceArn'
          - description: The Amazon Resource Name (ARN) of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        SchemaName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema. One of <code>SchemaArn</code> or <code>SchemaName</code> has to be provided.
        RegistryName:
          allOf:
          - $ref: '#/components/schemas/SchemaRegistryNameString'
          - description: The name of the schema registry that contains the schema.
      description: The unique ID of the schema in the Glue schema registry.
    PageSize:
      type: integer
      minimum: 1
      maximum: 1000
    ValueString:
      type: string
      maxLength: 1024
    Segment:
      type: object
      required:
      - SegmentNumber
      - TotalSegments
      properties:
        SegmentNumber:
          allOf:
          - $ref: '#/components/schemas/NonNegativeInteger'
          - description: The zero-based index number of the segment. For example, if the total number of segments is 4, <code>SegmentNumber</code> values range from 0 through 3.
        TotalSegments:
          allOf:
          - $ref: '#/components/schemas/TotalSegmentsInteger'
          - description: The total number of segments.
      description: Defines a non-overlapping region of a table's partitions, allowing multiple requests to be run in parallel.
    NameStringList:
      type: array
      items:
        $ref: '#/components/schemas/NameString'
    OperationTimeoutException: {}
    Column:
      type: object
      required:
      - Name
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the <code>Column</code>.
        Type:
          allOf:
          - $ref: '#/components/schemas/ColumnTypeString'
          - description: The data type of the <code>Column</code>.
        Comment:
          allOf:
          - $ref: '#/components/schemas/CommentString'
          - description: A free-form text comment.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define properties associated with the column.
      description: A column in a <code>Table</code>.
    FederationSourceException: {}
    ParametersMapValue:
      type: string
      maxLength: 512000
    CommentString:
      type: string
      minLength: 0
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    SkewedInfo:
      type: object
      properties:
        SkewedColumnNames:
          allOf:
          - $ref: '#/components/schemas/NameStringList'
          - description: A list of names of columns that contain skewed values.
        SkewedColumnValues:
          allOf:
          - $ref: '#/components/schemas/ColumnValueStringList'
          - description: A list of values that appear so frequently as to be considered skewed.
        SkewedColumnValueLocationMaps:
          allOf:
          - $ref: '#/components/schemas/LocationMap'
          - description: A mapping of skewed values to the columns that contain them.
      description: Specifies skewed values in a table. Skewed values are those that occur with very high frequency.
    Token:
      type: string
    PartitionList:
      type: array
      items:
        $ref: '#/components/schemas/Partition'
    Partition:
      type: object
      properties:
        Values:
          allOf:
          - $ref: '#/components/schemas/ValueStringList'
          - description: The values of the partition.
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the catalog database in which to create the partition.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the database table in which to create the partition.
        CreationTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time at which the partition was created.
        LastAccessTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The last time at which the partition was accessed.
        StorageDescriptor:
          allOf:
          - $ref: '#/components/schemas/StorageDescriptor'
          - description: Provides information about the physical location where the partition is stored.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define partition parameters.
        LastAnalyzedTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The last time at which column statistics were computed for this partition.
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog in which the partition resides.
      description: Represents a slice of table data.
    PredicateString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    SchemaVersionIdString:
      type: string
      pattern: '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'
      minLength: 36
      maxLength: 36
    FederationSourceRetryableException: {}
    CatalogIdString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    OrderList:
      type: array
      items:
        $ref: '#/components/schemas/Order'
    SchemaRegistryNameString:
      type: string
      pattern: '[a-zA-Z0-9-_$#.]+'
      minLength: 1
      maxLength: 255
    SerDeInfo:
      type: object
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: Name of the SerDe.
        SerializationLibrary:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: Usually the class that implements the SerDe. An example is <code>org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe</code>.
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define initialization parameters for the SerDe.
      description: Information about a serialization/deserialization program (SerDe) that serves as an extractor and loader.
    SchemaReference:
      type: object
      properties:
        SchemaId:
          allOf:
          - $ref: '#/components/schemas/SchemaId'
          - description: A structure that contains schema identity fields. Either this or the <code>SchemaVersionId</code> has to be provided.
        SchemaVersionId:
          allOf:
          - $ref: '#/components/schemas/SchemaVersionIdString'
          - description: The unique ID assigned to a version of the schema. Either this or the <code>SchemaId</code> has to be provided.
        SchemaVersionNumber:
          allOf:
          - $ref: '#/components/schemas/VersionLongNumber'
          - description: The version number of the schema.
      description: An object that references a schema stored in the Glue Schema Registry.
    GetPartitionsRequest:
      type: object
      required:
      - DatabaseName
      - TableName
      title: GetPartitionsRequest
      properties:
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog where the partitions in question reside. If none is provided, the Amazon Web Services account ID is used by default.
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the catalog database where the partitions reside.
        TableName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the partitions' table.
        Expression:
          allOf:
          - $ref: '#/components/schemas/PredicateString'
          - description: '<p>An expression that filters the partitions to be returned.</p> <p>The expression uses SQL syntax similar to the SQL <code>WHERE</code> filter clause. The SQL statement parser <a href="http://jsqlparser.sourceforge.net/home.php">JSQLParser</a> parses the expression. </p> <p> <i>Operators</i>: The following are the operators that you can use in the <code>Expression</code> API call:</p> <dl> <dt>=</dt> <dd> <p>Checks whether the values of the two operands are equal; if yes, then the condition becomes true.</p> <p>Example: Assume ''variable a'' holds 10 and ''variable b'' holds 20. </p> <p>(a = b) is not true.</p> </dd> <dt>&lt; &gt;</dt> <dd> <p>Checks whether the values of two operands are equal; if the values are not equal, then the condition becomes true.</p> <p>Example: (a &lt; &gt; b) is true.</p> </dd> <dt>&gt;</dt> <dd> <p>Checks whether the value of the left operand is greater than the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &gt; b) is not true.</p> </dd> <dt>&lt;</dt> <dd> <p>Checks whether the value of the left operand is less than the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &lt; b) is true.</p> </dd> <dt>&gt;=</dt> <dd> <p>Checks whether the value of the left operand is greater than or equal to the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &gt;= b) is not true.</p> </dd> <dt>&lt;=</dt> <dd> <p>Checks whether the value of the left operand is less than or equal to the value of the right operand; if yes, then the condition becomes true.</p> <p>Example: (a &lt;= b) is true.</p> </dd> <dt>AND, OR, IN, BETWEEN, LIKE, NOT, IS NULL</dt> <dd> <p>Logical operators.</p> </dd> </dl> <p> <i>Supported Partition Key Types</i>: The following are the supported partition keys.</p> <ul> <li> <p> <code>string</code> </p> </li> <li> <p> <code>date</code> </p> </li> <li> <p> <code>timestamp</code> </p> </li> <li> <p> <code>int</code> </p> </li> <li> <p> <code>bigint</code> </p> </li> <li> <p> <code>long</code> </p> </li> <li> <p> <code>tinyint</code> </p> </li> <li> <p> <code>smallint</code> </p> </li> <li> <p> <code>decimal</code> </p> </li> </ul> <p>If an type is encountered that is not valid, an exception is thrown. </p> <p>The following list shows the valid operators on each type. When you define a crawler, the <code>partitionKey</code> type is created as a <code>STRING</code>, to be compatible with the catalog partitions. </p> <p> <i>Sample API Call</i>: </p>'
        NextToken:
          allOf:
          - $ref: '#/components/schemas/Token'
          - description: A continuation token, if this is not the first call to retrieve these partitions.
        Segment:
          allOf:
          - $ref: '#/components/schemas/Segment'
          - description: The segment of the table's partitions to scan in this request.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/PageSize'
          - description: The maximum number of partitions to return in a single response.
        ExcludeColumnSchema:
          allOf:
          - $ref: '#/components/schemas/BooleanNullable'
          - description: When true, specifies not returning the partition column schema. Useful when you are interested only in other partition attributes such as partition values or location. This approach avoids the problem of a large response by not returning duplicate data.
        TransactionId:
          allOf:
          - $ref: '#/components/schemas/TransactionIdString'
          - description: The transaction ID at which to read the partition contents.
        QueryAsOfTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time as of when to read the partition contents. If not set, the most recent transaction commit time will be used. Cannot be specified along with <code>TransactionId</code>.
    ColumnValuesString:
      type: string
    ParametersMap:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ParametersMapValue'
    TotalSegmentsInteger:
      type: integer
      minimum: 1
      maximum: 10
    GlueResourceArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn):glue:.*
      minLength: 1
      maxLength: 10240
    TransactionIdString:
      type: string
      pattern: '[\p{L}\p{N}\p{P}]*'
      minLength: 1
      maxLength: 255
    ValueStringList:
      type: array
      items:
        $ref: '#/components/schemas/ValueString'
    GlueEncryptionException: {}
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    Order:
      type: object
      required:
      - Column
      - SortOrder
      properties:
        Column:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the column.
        SortOrder:
