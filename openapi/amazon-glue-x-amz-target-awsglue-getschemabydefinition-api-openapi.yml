              schema:
                $ref: '#/components/schemas/InternalServiceException'
              examples:
                GetSchemaByDefinition483Example:
                  summary: Default GetSchemaByDefinition 483 response
                  x-microcks-default: true
                  value:
                    JobRunId: jr_abc123
                    State: SUCCEEDED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetSchemaByDefinitionInput'
      parameters:
      - name: X-Amz-Target
        in: header
