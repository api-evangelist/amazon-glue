components:
  schemas:
    InternalServiceException: {}
    ColumnTypeString:
      type: string
      minLength: 0
      maxLength: 131072
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    EntityNotFoundException: {}
    PartitionValueList:
      type: object
      required:
      - Values
      properties:
        Values:
