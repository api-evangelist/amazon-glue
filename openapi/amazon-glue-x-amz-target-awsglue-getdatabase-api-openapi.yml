components:
  schemas:
    FederationIdentifier:
      type: string
      minLength: 1
      maxLength: 512
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    PrincipalPermissionsList:
      type: array
      items:
        $ref: '#/components/schemas/PrincipalPermissions'
    PermissionList:
      type: array
      items:
        $ref: '#/components/schemas/Permission'
    InternalServiceException: {}
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    EntityNotFoundException: {}
    OperationTimeoutException: {}
    FederationSourceException: {}
    ParametersMapValue:
      type: string
      maxLength: 512000
    FederatedDatabase:
      type: object
      properties:
        Identifier:
          allOf:
          - $ref: '#/components/schemas/FederationIdentifier'
          - description: A unique identifier for the federated database.
        ConnectionName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the connection to the external metastore.
      description: A database that points to an entity outside the Glue Data Catalog.
    URI:
      type: string
      minLength: 1
      maxLength: 1024
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\r\n\t]*'
    PrincipalPermissions:
      type: object
      properties:
        Principal:
          allOf:
          - $ref: '#/components/schemas/DataLakePrincipal'
          - description: The principal who is granted permissions.
        Permissions:
          allOf:
          - $ref: '#/components/schemas/PermissionList'
          - description: The permissions that are granted to the principal.
      description: Permissions granted to a principal.
    Database:
      type: object
      required:
      - Name
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the database. For Hive compatibility, this is folded to lowercase when it is stored.
        Description:
          allOf:
          - $ref: '#/components/schemas/DescriptionString'
          - description: A description of the database.
        LocationUri:
          allOf:
          - $ref: '#/components/schemas/URI'
          - description: The location of the database (for example, an HDFS path).
        Parameters:
          allOf:
          - $ref: '#/components/schemas/ParametersMap'
          - description: These key-value pairs define parameters and properties of the database.
        CreateTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time at which the metadata database was created in the catalog.
        CreateTableDefaultPermissions:
          allOf:
          - $ref: '#/components/schemas/PrincipalPermissionsList'
          - description: Creates a set of default permissions on the table for principals. Used by Lake Formation. Not used in the normal course of Glue operations.
        TargetDatabase:
          allOf:
          - $ref: '#/components/schemas/DatabaseIdentifier'
          - description: A <code>DatabaseIdentifier</code> structure that describes a target database for resource linking.
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog in which the database resides.
        FederatedDatabase:
          allOf:
          - $ref: '#/components/schemas/FederatedDatabase'
          - description: A <code>FederatedDatabase</code> structure that references an entity outside the Glue Data Catalog.
      description: The <code>Database</code> object represents a logical grouping of tables that might reside in a Hive metastore or an RDBMS.
    DatabaseIdentifier:
      type: object
      properties:
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog in which the database resides.
        DatabaseName:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the catalog database.
      description: A structure that describes a target database for resource linking.
    CatalogIdString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    DataLakePrincipal:
      type: object
      properties:
        DataLakePrincipalIdentifier:
          allOf:
          - $ref: '#/components/schemas/DataLakePrincipalString'
          - description: An identifier for the Lake Formation principal.
      description: The Lake Formation principal.
    GetDatabaseResponse:
      type: object
      properties:
        Database:
          allOf:
          - $ref: '#/components/schemas/Database'
          - description: The definition of the specified database in the Data Catalog.
    ParametersMap:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ParametersMapValue'
    Permission:
      type: string
      enum:
      - ALL
      - SELECT
      - ALTER
      - DROP
      - DELETE
      - INSERT
      - CREATE_DATABASE
      - CREATE_TABLE
      - DATA_LOCATION_ACCESS
    GlueEncryptionException: {}
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      x-pattern: '[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]*'
    GetDatabaseRequest:
      type: object
      required:
      - Name
      title: GetDatabaseRequest
      properties:
        CatalogId:
          allOf:
          - $ref: '#/components/schemas/CatalogIdString'
          - description: The ID of the Data Catalog in which the database resides. If none is provided, the Amazon Web Services account ID is used by default.
        Name:
          allOf:
          - $ref: '#/components/schemas/NameString'
          - description: The name of the database to retrieve. For Hive compatibility, this should be all lowercase.
    DataLakePrincipalString:
      type: string
      minLength: 1
      maxLength: 255
    Timestamp:
      type: string
      format: date-time
    InvalidInputException: {}
  parameters:
    X-Amz-SignedHeaders:
