aid: amazon-glue
name: Amazon Glue
description: >-
  Amazon Glue is a serverless data integration service that makes it simple to discover, prepare, move, and integrate
  data from multiple sources for analytics, machine learning, and application development. It provides both visual and
  code-based interfaces for ETL operations and includes a Data Catalog for unified metadata management.
